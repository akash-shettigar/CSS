<!DOCTYPE html>
<html>
<head>
  <title>CSS Lesson 2</title>
  <style>
    p {
      color: blue;
    }

    .highlight {
      background-color: yellow;
      color: #000;
    }

    #special {
      color: red;
      font-size: 22px;
    }

    div {
        background-color: #000000;
        width: 100px;
        height: 100px;
    }

  </style>
</head>
<body>

  <p>Normal paragraph</p>
  <p class="highlight">Highlighted paragraph</p>
  <p class="highlight" id="special">Special paragraph</p>
  <div>
     <div style="background-color: rgb(37, 137, 224); width: 50%; height: 50%; " ></div>
  </div>

</body>
</html>
