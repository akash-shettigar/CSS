<!DOCTYPE html>
<html>

<head>
    <title>Flex box 1</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 200px;
            background: #ddd;
        }

        .item {
            width: 60px;
            height: 60px;
            background: teal;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

</body>

</html>
