<!DOCTYPE html>
<html>

<head>
    <title>Flexbox 2</title>
    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-content: space-around;
            height: 300px;
            background: #eee;
        }

        .item {
            width: 80px;
            height: 80px;
            background: tomato;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .special {
            align-self: flex-end;
            background: teal;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item">1</div>
        <div class="item special">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>

</body>

</html>
