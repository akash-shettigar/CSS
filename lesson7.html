<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z Index</title>
    <style>
        .parent {
            position: relative;
            z-index: 10;
            width: 200px;
            height: 200px;
            background: gray;
        }

        .child {
            position: absolute;
            z-index: 5;
            background: red;
        }

        .other {
            position: relative;
            z-index: 2;
            background: blue;
        }
    </style>
</head>

<body>
    <div class="parent">
        Parent
        <div class="child">Child</div>
    </div>

    <div class="other">Other</div>
</body>

</html>
