<!DOCTYPE html>
<html>
<head>
  <title>Display</title>
  <style>
    *{
        margin: 0;
        padding: 0;
    }

    .box {
      width: 100px;
      height: 100px;
      background-color: lightblue;
      margin: 10px;
    }

    .block {
      display: block;
    }

    .inline {
      display: inline;
    }

    .inline-block {
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="box block">Block</div>
  <div class="box inline">Inline</div>
  <div class="box inline-block">Inline-block</div>

</body>
</html>
